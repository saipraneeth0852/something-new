name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties with test values
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "PEXELS_API_KEY=test_api_key" >> local.properties
          echo "ADMOB_APP_ID=ca-app-pub-3940256099942544~3347511713" >> local.properties
          echo "BANNER_AD_UNIT_ID=ca-app-pub-3940256099942544/6300978111" >> local.properties
          echo "INTERSTITIAL_AD_UNIT_ID=ca-app-pub-3940256099942544/1033173712" >> local.properties

      - name: Create placeholder google-services.json
        run: |
          mkdir -p app
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "123456789",
              "project_id": "test-project",
              "storage_bucket": "test-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:abcdef",
                  "android_client_info": {
                    "package_name": "com.statushub.india"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "test_key" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:abcdef_debug",
                  "android_client_info": {
                    "package_name": "com.statushub.india.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "test_key" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-debug.html

  release:
    name: Build Release APK
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> local.properties
          echo "ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}" >> local.properties
          echo "BANNER_AD_UNIT_ID=${{ secrets.BANNER_AD_UNIT_ID }}" >> local.properties
          echo "INTERSTITIAL_AD_UNIT_ID=${{ secrets.INTERSTITIAL_AD_UNIT_ID }}" >> local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          echo "RELEASE_STORE_FILE=release.keystore" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
