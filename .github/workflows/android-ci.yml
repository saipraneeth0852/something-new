name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v3

      - name: Create config files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PEXELS_API_KEY=test_key" >> local.properties
          echo "ADMOB_APP_ID=ca-app-pub-3940256099942544~3347511713" >> local.properties
          mkdir -p app
          printf '{"project_info":{"project_number":"123456789012","project_id":"test-123","storage_bucket":"test-123.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789012:android:abc","android_client_info":{"package_name":"com.statushub.india"}},"api_key":[{"current_key":"AIzaSyA"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}},{"client_info":{"mobilesdk_app_id":"1:123456789012:android:abd","android_client_info":{"package_name":"com.statushub.india.debug"}},"api_key":[{"current_key":"AIzaSyA"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
          chmod +x gradlew

      - name: Build debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Test
        if: always()
        run: ./gradlew testDebugUnitTest --no-daemon --continue

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-*.apk
