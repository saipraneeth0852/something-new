name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PEXELS_API_KEY=test_api_key" >> local.properties
          echo "ADMOB_APP_ID=ca-app-pub-3940256099942544~3347511713" >> local.properties
          echo "BANNER_AD_UNIT_ID=ca-app-pub-3940256099942544/6300978111" >> local.properties
          echo "INTERSTITIAL_AD_UNIT_ID=ca-app-pub-3940256099942544/1033173712" >> local.properties

      - name: Create google-services.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('app', { recursive: true });
            fs.writeFileSync('app/google-services.json', JSON.stringify({
              project_info: {
                project_number: "123456789012",
                firebase_url: "",
                project_id: "test-project-123",
                storage_bucket: "test-project-123.appspot.com"
              },
              client: [
                {
                  client_info: {
                    mobilesdk_app_id: "1:123456789012:android:abcdef123456",
                    android_client_info: { package_name: "com.statushub.india" }
                  },
                  api_key: [{ current_key: "AIzaSyABCDEFGHIJKLMNOPQRSTUVWXY123456" }],
                  services: {
                    appinvite_service: { other_platform_oauth_client: [] },
                    analytics_service: { status: 0 }
                  },
                  oauth_client: [],
                  certificate_hash: []
                },
                {
                  client_info: {
                    mobilesdk_app_id: "1:123456789012:android:abcdef123457",
                    android_client_info: { package_name: "com.statushub.india.debug" }
                  },
                  api_key: [{ current_key: "AIzaSyABCDEFGHIJKLMNOPQRSTUVWXY123456" }],
                  services: {
                    appinvite_service: { other_platform_oauth_client: [] },
                    analytics_service: { status: 0 }
                  },
                  oauth_client: [],
                  certificate_hash: []
                }
              ],
              configuration_version: "1"
            }, null, 2));

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        if: always()
        run: ./gradlew testDebugUnitTest --no-daemon --continue --stacktrace

      - name: Upload debug APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  release:
    name: Build Release APK
    needs: build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.RELEASE_KEYSTORE_BASE64 != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> local.properties
          echo "ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}" >> local.properties
          echo "BANNER_AD_UNIT_ID=${{ secrets.BANNER_AD_UNIT_ID }}" >> local.properties
          echo "INTERSTITIAL_AD_UNIT_ID=${{ secrets.INTERSTITIAL_AD_UNIT_ID }}" >> local.properties

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore
          echo "RELEASE_STORE_FILE=release.keystore" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties

      - name: Create google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
